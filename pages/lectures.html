<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتبة المحاضرات | كلية النهضة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Cairo', sans-serif;
    margin:0;
    padding:0;
    background: linear-gradient(135deg, #cce7ff 0%, #99d4ff 100%);
    overflow-x: hidden;
    position: relative;
}

/* خلفية شبكية طبية متحركة */
body::before {
    content:"";
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px), radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-position: 0 0, 25px 25px;
    background-size:50px 50px;
    animation: moveGrid 60s linear infinite;
    z-index:-1;
}
@keyframes moveGrid {
    0% {background-position:0 0, 25px 25px;}
    50% {background-position:1000px 500px, 1025px 525px;}
    100% {background-position:0 0, 25px 25px;}
}

/* القائمة الجانبية */

.menu-btn{
position:fixed;
right:15px;
top:15px;
background:#1976d2;
color:white;
border:none;
padding:10px;
font-size:20px;
border-radius:6px;
z-index:1000;
cursor:pointer;
}

.sidebar{
height:100%;
width:0;
position:fixed;
right:0;
top:0;
background:#0d47a1;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:16px;
}

.sidebar a:hover{
background:#1565c0;
}


/* شاشة القفل */
#lockScreen {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(11,61,145,0.95);
    color:white;
    display:flex;
    flex-direction: column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#lockScreen input {
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:none;
    margin:10px;
}
#lockScreen button {
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#06a9f5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
#lockScreen button:hover { background:#0284c7; }

/* الترويسة */
header {
    text-align: center;
    padding: 20px;
    background: #0b3d91;
    color:white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
header img { height: 80px; }
header h1 { margin: 10px 0; font-size: 36px; font-weight: 700; }

/* أزرار التلجرام */
.telegram-links {
    margin: 15px 0 20px 0;
}
.telegram-links a {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: white;
    background: #06a9f5;
    padding: 8px 15px;
    border-radius: 6px;
    margin: 0 5px;
    font-weight: bold;
    transition:0.3s transform,0.3s background;
}
.telegram-links a:hover {
    background:#0284c7;
    transform: scale(1.05);
}
.telegram-links a img {
    height: 20px;
    margin-left: 8px;
}

/* شريط البحث */
.search-bar { margin:20px auto; max-width:600px; display:flex; }
.search-bar input {
    flex:1; padding:12px 15px; border-radius:6px 0 0 6px; border:none; font-size:16px; outline:none;
    transition:box-shadow 0.3s;
}
.search-bar input:focus { box-shadow: 0 0 10px rgba(0,123,255,0.6); }
.search-bar button {
    padding:12px 20px; border:none; background:#06a9f5; color:white; font-weight:bold; border-radius:0 6px 6px 0;
    cursor:pointer; transition:0.3s transform,0.3s background;
}
.search-bar button:hover { background:#0284c7; transform: scale(1.05); }

/* بطاقات المحاضرات */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:50px 40px;
    max-width:1200px;
    margin:auto;
}
.card {
    background: rgba(255,255,255,0.85);
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
    transform: translateY(-10px) rotateX(2deg);
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}
.card h3 { margin-top:0; color:#0b3d91; font-size:20px; }
.card p { margin:5px 0; font-size:14px; }
.download {
    background:#0b3d91;
    color:white;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    margin-top:12px;
    text-align:center;
    transition:0.3s transform,0.3s background;
}
.download:hover { background:#062b63; transform: scale(1.05); }

/* تقييم النجوم */
.stars {
    display:flex;
    gap:5px;
    margin-top:10px;
}
.star {
    font-size:20px;
    color:gray;
    cursor:pointer;
    transition: color 0.3s;
}
.star:hover, .star.selected { color:gold; }

/* حقوق محفوظة */
footer {
    text-align:center;
    padding:20px;
    background: rgba(11,61,145,0.9);
    color:white;
    font-size:14px;
    box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}
@media (max-width:768px){
    .search-bar { flex-direction:column; }
    .search-bar input, .search-bar button { border-radius:6px; margin:5px 0; }
}
</style>
</head>
<body>

<!-- شاشة القفل -->

<header>

<script>
/* شاشة القفل */
function unlock(){
    const pass = document.getElementById("passwordInput").value;
    if(pass === "12345"){
        document.getElementById("lockScreen").style.display="none";
    }else{
        alert("كلمة السر خاطئة!");
    }
}

/* عداد الزوار */
if(!localStorage.getItem("visits")) localStorage.setItem("visits",0);
localStorage.setItem("visits",parseInt(localStorage.getItem("visits"))+1);
console.log("عدد زياراتك: "+localStorage.getItem("visits"));

/* تحميل المحاضرات */
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkd4IsXYV00R713OzChJjhVy2WvWkH_psiWrxIgzVDAB6X2UKWpqp896AHNWX3T5we0gWF61sFnuZq/pub?output=csv";
let lecturesData = [];
let downloads = {}; // إحصائيات التحميل
function loadLectures() {
    fetch(url)
    .then(res=>res.text())
    .then(text=>{
        let rows = text.trim().split("\n");
        lecturesData=[];
        for(let i=1;i<rows.length;i++){
            let cols=rows[i].split(",");
            if(cols[0] && cols[3]){
                lecturesData.push({
                    title:cols[0],
                    doctor:cols[1],
                    semester:cols[2],
                    file:cols[3],
                    stars:0
                });
            }
        }
        displayLectures(lecturesData);
    });
}

/* عرض المحاضرات */
function displayLectures(data){
    let html="";
    data.forEach((l,index)=>{
        html+=`
        <div class="card">
            <h3>${l.title}</h3>
            <p>👨‍⚕️ الدكتور: ${l.doctor}</p>
            <p>🎓 الفصل: ${l.semester}</p>
            <a class="download" href="${l.file}" target="_blank" onclick="trackDownload(${index})">⬇ تحميل المحاضرة</a>
            <div class="stars">
                <span class="star" onclick="rateLecture(${index},1)">★</span>
                <span class="star" onclick="rateLecture(${index},2)">★</span>
                <span class="star" onclick="rateLecture(${index},3)">★</span>
                <span class="star" onclick="rateLecture(${index},4)">★</span>
                <span class="star" onclick="rateLecture(${index},5)">★</span>
            </div>
        </div>`;
    });
    document.getElementById("lectures").innerHTML=html;
}

/* البحث */
function searchLectures(){
    const query=document.getElementById("searchInput").value.toLowerCase();
    const filtered=lecturesData.filter(l=>l.title.toLowerCase().includes(query) || l.doctor.toLowerCase().includes(query) || l.semester.toLowerCase().includes(query));
    displayLectures(filtered);
}

/* تقييم النجوم */
function rateLecture(index,stars){
    lecturesData[index].stars=stars;
    displayLectures(lecturesData);
    alert(`لقد قيمت المحاضرة بـ ${stars} نجوم`);
}

/* إحصائيات التحميل */
function trackDownload(index){
    downloads[index]=(downloads[index]||0)+1;
    console.log(`تم تحميل ${lecturesData[index].title} ${downloads[index]} مرة`);
}

loadLectures();
</script>

<script>

let menu=document.getElementById("sidebar");

menu.style.width = menu.style.width==="250px" ? "0":"250px";

</script>
