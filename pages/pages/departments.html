<html lang="ar">
<head>

    <title>كية النهضة  </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
          font-family:'Cairo', sans-serif;
            background: #f4f7fc;
            color: #023047;
            padding: 1.2rem 0.8rem;
            direction: rtl;
        }

        .main-container {
            max-width: 1500px;
            margin: 0 auto;
        }


/* القائمة الجانبية */

.menu-btn{
position:fixed;
right:15px;
top:15px;
background:#1976d2;
color:white;
border:none;
padding:10px;
font-size:20px;
border-radius:6px;
z-index:1000;
cursor:pointer;
}

.sidebar{
height:100%;
width:0;
position:fixed;
right:0;
top:0;
background:#0d47a1;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:16px;
}

.sidebar a:hover{
background:#1565c0;
}

        /* رأس الصفحة */
        .header {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .header h1 {
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #0a3147, #1d5b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        .header h1 span {
            display: block;
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            font-weight: 400;
            color: #b68b40;
            -webkit-text-fill-color: #b68b40;
        }

        .header p {
            background: rgba(182, 139, 64, 0.2);
            color: #1f4b6e;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            display: inline-block;
            font-weight: 500;
            margin-top: 0.8rem;
            border: 1px solid #c2a25b;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
        }

        /* أزرار الأقسام الأربعة في صف واحد */
        .dept-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .dept-tab {
            flex: 1 1 180px;
            min-width: 150px;
            padding: 1.2rem 0.5rem;
            border: none;
            border-radius: 40px;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .dept-tab:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 22px rgba(0, 0, 0, 0.2);
        }

        .dept-tab.active {
            border: 3px solid white;
            box-shadow: 0 0 0 3px currentColor;
        }

        /* ألوان خاصة بكل قسم */
        .tab-nursing { background: #1a5f7a; }      /* أزرق عميق */
        .tab-hadm { background: #2d6a4f; }         /* أخضر غامق */
        .tab-pharmacy { background: #8a2b3c; }     /* عنابي */
        .tab-medlab { background: #b6622b; }       /* برتقالي محروق */

        /* محتوى القسم النشط - يظهر أسفل الأزرار */
        .dept-active-content {
            background: white;
            border-radius: 50px;
            padding: 2rem 1.5rem;
            box-shadow: 0 30px 40px -20px #1f3b4f;
            margin-top: 1.5rem;
            border: 1px solid #ffffff90;
            transition: all 0.3s;
        }

        /* رؤية ورسالة القسم */
        .vision-mission {
            background: #f8faff;
            border-radius: 40px;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            border-right: 10px solid;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }

        .vision-mission h3 {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
            color: #0a2f44;
        }

        .vision-mission p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #194b6b;
            line-height: 1.7;
        }

        /* معرض صور افتراضي (دوائر) */
        .gallery-section {
            margin-bottom: 2.5rem;
        }

        .gallery-section h3 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            color: #0a2f44;
            padding-right: 1rem;
        }

        .gallery-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        .gallery-item {
            width: 110px;
            height: 110px;
            border-radius: 30px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 20px -8px rgba(0,0,0,0.3);
            border: 3px solid white;
            transition: 0.3s;
            filter: brightness(0.95);
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(1deg);
            filter: brightness(1.05);
        }

        /* الفصول (نفس التصميم السابق ولكن مضغوط) */
        .dept-content-row {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .semester-list {
            flex: 1 1 220px;
            background: #f4f9ff;
            border-radius: 38px;
            padding: 1.2rem 0.8rem;
            box-shadow: inset 0 2px 8px rgba(0,40,70,0.1), 0 6px 14px rgba(0, 51, 102, 0.1);
            border: 1px solid #d9e3f0;
            align-self: flex-start;
        }

        .semester-list h4 {
            font-size: 1.5rem;
            color: #0f3b54;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
            border-bottom: 3px dotted #b68b40;
            padding-bottom: 0.5rem;
        }

        .sem-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sem-btn {
            background: #eaf1fa;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #0b3b5c;
            text-align: right;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 30, 60, 0.08);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sem-btn .sem-icon {
            background: #b68b40;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .sem-btn.active {
            background: linear-gradient(135deg, #1f5e8e, #0f3f62);
            color: white;
            border-color: #b68b40;
        }

        .sem-btn.active .sem-icon {
            background: #ffd966;
            color: #0b3b5c;
        }

        .courses-panel {
            flex: 3 1 300px;
            background: #ffffff;
            border-radius: 38px;
            padding: 1.3rem 1.2rem 1.8rem 1.2rem;
            box-shadow: 0 12px 22px -10px #163a50;
            border: 1px solid #e4ebf5;
        }

        .courses-panel h4 {
            font-size: 1.7rem;
            color: #1d4d6b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .courses-panel h4 span {
            background: #b68b40;
            color: white;
            font-size: 1rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.9rem;

        .course-item {
            background: #f6faff;

            border: 1px solid #cbd6e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .course-name { font-weight: 600; color: #023e5a; }
        .course-code {
            background: #0f3f62; color: white; padding: 0.2rem 0.7rem;
            border-radius: 30px; font-size: 0.7rem; font-weight: 600;

            margin-top: 2.5rem;

</head>

        // ------------------------------------------------------------
        // 3. دوال إنشاء عناصر HTML
        // ------------------------------------------------------------
        function buildCoursesPanel(coursesObj, containerIdPrefix) {
            // ننشئ div خاص بالفصول داخل المحتوى الرئيسي
            const semListDiv = document.createElement('div');
            semListDiv.className = 'semester-list';
            semListDiv.innerHTML = '<h4>الفصول</h4><div class="sem-buttons" id="'+containerIdPrefix+'-sem"></div>';

            const coursesPanelDiv = document.createElement('div');
            coursesPanelDiv.className = 'courses-panel';
            coursesPanelDiv.innerHTML = '<h4>اختر فصلاً <span>المواد</span></h4><div class="courses-grid" id="'+containerIdPrefix+'-grid"></div>';

            return { semListDiv, coursesPanelDiv };
        }

        function initDeptSemesters(containerIdPrefix, coursesObj, semButtonsId, gridId) {
            const semDiv = document.getElementById(semButtonsId);
            const gridDiv = document.getElementById(gridId);
            if (!semDiv || !gridDiv) return;
            const semesters = ['1','2','3','4','5','6','7','8'];
            semDiv.innerHTML = '';
            semesters.forEach(sem => {
                const btn = document.createElement('button');
                btn.className = 'sem-btn';
                btn.setAttribute('data-sem', sem);
                btn.innerHTML = `<span class="sem-icon">${sem}</span> الفصل ${sem}`;
                semDiv.appendChild(btn);
            });

            const buttons = semDiv.querySelectorAll('.sem-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const semKey = this.getAttribute('data-sem');
                    const courses = coursesObj[semKey] || [['لا توجد مواد','']];
                    gridDiv.innerHTML = '';
                    courses.forEach(c => {
                        const [name, code] = c;
                        const item = document.createElement('div');
                        item.className = 'course-item';
                        item.innerHTML = `<span class="course-name">${name}</span><span class="course-code">${code}</span>`;
                        gridDiv.appendChild(item);
                    });
                });
            });
            if (buttons.length) buttons[0].click();
        }

        // دالة لعرض محتوى القسم النشط
        function renderDept(deptKey) {
            const container = document.getElementById('active-dept-content');
            const meta = deptMeta[deptKey];
            let coursesObj;
            if (deptKey === 'nursing') coursesObj = nursingCourses;
            else if (deptKey === 'hadm') coursesObj = hadmCourses;
            else if (deptKey === 'pharmacy') coursesObj = pharmCourses;
            else coursesObj = medlabCourses;

            const prefix = deptKey+'-inner';

            // بناء هيكل HTML
            let html = `
                <div class="vision-mission" style="border-color: ${deptKey === 'nursing'?'#1a5f7a':deptKey==='hadm'?'#2d6a4f':deptKey==='pharmacy'?'#8a2b3c':'#b6622b'}">
                    <h3>رؤية القسم</h3>
                    <p>${meta.vision}</p>
                    <h3>رسالة القسم</h3>
                    <p>${meta.message}</p>
                </div>
                <div class="gallery-section">
                    <h3>معرض الصور</h3>
                    <div class="gallery-grid" id="${prefix}-gallery"></div>
                </div>
                <div class="dept-content-row" id="${prefix}-row">
                    <!-- سيتم إدراج قائمة الفصول ولوحة المقررات هنا عبر JS لاحقاً -->
                </div>
            `;
            container.innerHTML = html;

            // إدراج معرض الصور
            const galleryGrid = document.getElementById(prefix+'-gallery');
            meta.images.forEach(src => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'gallery-item';
                imgDiv.style.backgroundImage = `url('${src}')`;
                galleryGrid.appendChild(imgDiv);
            });

            // إنشاء عنصري الفصول (القائمة + البانل)
            const rowDiv = document.getElementById(prefix+'-row');
            const semListDiv = document.createElement('div');
            semListDiv.className = 'semester-list';
            semListDiv.innerHTML = `<h4>الفصول الدراسية</h4><div class="sem-buttons" id="${prefix}-sem-btns"></div>`;

            const coursesDiv = document.createElement('div');
            coursesDiv.className = 'courses-panel';
            coursesDiv.innerHTML = `<h4>اختر فصلاً <span>المواد</span></h4><div class="courses-grid" id="${prefix}-courses-grid"></div>`;

            rowDiv.appendChild(semListDiv);
            rowDiv.appendChild(coursesDiv);

            // تهيئة الأزرار والمقررات
            initDeptSemesters(prefix, coursesObj, prefix+'-sem-btns', prefix+'-courses-grid');
        }

        // أزرار tabs
        const tabs = document.querySelectorAll('.dept-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const dept = this.getAttribute('data-dept');
                renderDept(dept);
            });
        });

        // تحميل القسم الأول افتراضياً (التمريض)
        renderDept('nursing');
    })();
</script>
