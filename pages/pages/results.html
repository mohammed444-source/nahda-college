<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick University Quiz</title>
<style>
body{
  font-family: 'Arial', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #f4f6f9 0%, #e8edf5 100%);
  margin:0;
  padding:0;
  min-height: 100vh;
}
/* Header Styles */
.header {
  background: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%);
  color: white;
  padding: 15px 0;
  text-align: center;
  border-bottom: 5px solid #ff9800;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none" opacity="0.05"><path d="M0,0 L100,100" stroke="white" stroke-width="1"/><path d="M0,100 L100,0" stroke="white" stroke-width="1"/></svg>');
  pointer-events: none;
}
.header-content {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 25px;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}
.logo-container {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255, 255, 255, 0.1);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(5px);
  border: 2px solid rgba(255, 255, 255, 0.2);
}
.logo {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  object-fit: contain;
  background: white;
  padding: 8px;
  transition: transform 0.3s ease;
}
.logo:hover {
  transform: scale(1.05);
}
.header-text {
  text-align: left;
  flex: 1;
}
.header h1 {
  margin: 0;
  font-size: 34px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  background: linear-gradient(135deg, #ffffff 0%, #ffeb3b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  margin: 10px 0 0;
  font-size: 18px;
  opacity: 0.95;
  font-weight: 500;
}
.university-name {
  color: #ffeb3b;
  font-weight: bold;
  font-size: 20px;
}
.dept-name {
  font-size: 15px;
  opacity: 0.9;
  margin-top: 5px;
  display: block;
}

.container{
  max-width: 950px;
  margin: 35px auto;
  padding: 20px;
}
.card{
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  padding: 40px;
  margin-bottom: 25px;
  border: 1px solid rgba(0,0,0,0.05);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
}
.question{
  font-size: 24px;
  font-weight: bold;
  margin: 25px 0;
  line-height: 1.5;
  color: #2c3e50;
}
.unit{
  color: #0d47a1;
  margin-bottom: 20px;
  font-size: 19px;
  font-weight: 600;
  padding: 10px 20px;
  background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 100%);
  border-radius: 10px;
  display: inline-block;
  border-left: 5px solid #0d47a1;
}
.choices{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}
button{
  padding: 18px;
  font-size: 17px;
  border-radius: 12px;
  border: 2px solid #e0e0e0;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
  text-align: left;
}
.choice{
  background: linear-gradient(135deg, #f8fafc 0%, #e8edf5 100%);
  color: #2c3e50;
}
.choice:hover{
  background: linear-gradient(135deg, #e3eaf2 0%, #d0d9e5 100%);
  transform: translateY(-3px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  border-color: #0d47a1;
}
.correct{
  background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
  color: #fff;
  border-color: #1b5e20;
}
.wrong{
  background: linear-gradient(135deg, #c62828 0%, #ef5350 100%);
  color: #fff;
  border-color: #b71c1c;
}
#feedback{
  margin-top: 25px;
  font-weight: bold;
  font-size: 19px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
input{
  padding: 16px;
  font-size: 17px;
  width: 100%;
  border: 2px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
  margin-bottom: 10px;
}
input:focus{
  outline: none;
  border-color: #0d47a1;
  box-shadow: 0 0 0 3px rgba(13,71,161,0.15);
}

/* Instructions Styling */
.instructions {
  margin-top: 30px;
  padding: 25px;
  background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
  border-radius: 12px;
  border-left: 5px solid #0d47a1;
  position: relative;
}
.instructions::before {
  content: '📋';
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 30px;
  opacity: 0.2;
}
.instructions h3 {
  margin-top: 0;
  color: #0d47a1;
  font-size: 22px;
  margin-bottom: 15px;
}
.instructions ul {
  margin: 20px 0;
  padding-left: 25px;
}
.instructions li {
  margin-bottom: 12px;
  line-height: 1.6;
  position: relative;
}
.instructions li::before {
  content: '✓';
  color: #0d47a1;
  font-weight: bold;
  position: absolute;
  left: -20px;
}

/* Results Page Styling */
.results-card {
  text-align: center;
}
.score-display {
  font-size: 56px;
  font-weight: bold;
  background: linear-gradient(135deg, #0d47a1 0%, #2196f3 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 20px 0;
}
.result-message {
  font-size: 22px;
  margin: 25px 0;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid rgba(0,0,0,0.1);
}

/* Responsive Design */
@media (max-width: 768px) {
  .header-content {
    flex-direction: column;
    text-align: center;
    gap: 15px;
  }
  .logo-container {
    flex-direction: column;
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  .header-text {
    text-align: center;
  }
  .choices {
    grid-template-columns: 1fr;
  }
  .header h1 {
    font-size: 28px;
  }
  .container {
    padding: 15px;
    margin: 20px auto;
  }
  .card {
    padding: 25px;
  }
  .logo {
    width: 100px;
    height: 100px;
  }
}

/* Floating Animation */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.floating {
  animation: float 3s ease-in-out infinite;
}

/* القائمة الجانبية */

.menu-btn{
position:fixed;
right:15px;
top:15px;
background:#1976d2;
color:white;
border:none;
padding:10px;
font-size:20px;
border-radius:6px;
z-index:1000;
cursor:pointer;
}

.sidebar{
height:100%;
width:0;
position:fixed;
right:0;
top:0;
background:#0d47a1;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:16px;
}

.sidebar a:hover{
background:#1565c0;
}

</style>

 <style>

<div class="container">
    <h2>الاستعلام  عن نتيجة الطالب</h2>
    <input type="text" id="studentId" placeholder="أدخل الرقم الدراسي">
<div style="text-align: center;">
    <button onclick="getResult()">عرض النتيجة</button>
</div>
    <div id="result"></div>
</div>

<script>
async function getResult() {

    let id = document.getElementById("studentId").value.trim();
    let resultDiv = document.getElementById("result");

    if (!id) {
        resultDiv.innerHTML = "<p class='fail'>الرجاء إدخال الرقم الدراسي</p>";
        return;
    }

    let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzk7PMadMoxmOkh4gEVnyn9nJKxSmI8TUpph-Rxrb-Q6lcG8-uYjZpysmKxLe5Ewg9Mc-h3xZYoD3K/pub?gid=2073382161&single=true&output=csv";

    try {
        let response = await fetch(url);
        let data = await response.text();
        let rows = data.split("\n");

        // الصف الأول = أسماء الأعمدة
        let headers = rows[0].split(",");

        // البحث عن الطالب
        let studentRow = null;
        for (let i = 1; i < rows.length; i++){
            let cols = rows[i].split(",");
            if (cols[0].trim() === id){
                studentRow = cols;
                break;
            }
        }

        if (studentRow) {

            let table  = "<table><tr>";
            headers.forEach(h => table += "<th>" + h + "</th>");
            table += "</tr><tr>";
            studentRow.forEach(c => table += "<td>" + c + "</td>");
            table += "</tr></table>";

            resultDiv.innerHTML = table;

        } else {
            resultDiv.innerHTML = "<p class='fail'>الرقم الدراسي غير موجود</p>";
        }

    } catch (error) {
        resultDiv.innerHTML = "<p class='fail'>خطأ في تحميل البيانات</p>";
    }
}
</script>
