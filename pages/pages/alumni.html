<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>كلية النهضة الجديدة – خريجونا</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(165deg, #eef5fc 0%, #f8fbfe 80%);
            min-height: 100vh;
            color: #022b40;
            padding: 0;
            direction: rtl;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الخلفية الزرقاء للشعار */
        .logo-header {
            background: #0a3a5c;
            width: 100%;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }

        .logo-header img {
            max-width: 100%;
            height: auto;
            max-height: 100px;
            object-fit: contain;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            padding: 0 1rem 2rem 1rem;
        }
        
/* القائمة الجانبية */

.menu-btn{
position:fixed;
right:15px;
top:15px;
background:#1976d2;
color:white;
border:none;
padding:10px;
font-size:20px;
border-radius:6px;
z-index:1000;
cursor:pointer;
}

.sidebar{
height:100%;
width:0;
position:fixed;
right:0;
top:0;
background:#0d47a1;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:16px;
}

.sidebar a:hover{
background:#1565c0;
}

        /* النص التعريفي تحت الشعار */
        .intro-text {
            text-align: center;
            margin-bottom: 2rem;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
            color: #05445E;
            background: rgba(255,255,255,0.7);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            margin-right: auto;
            margin-left: auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid #b68b40;
            backdrop-filter: blur(10px);
        }

        .intro-text span {
            color: #b68b40;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            display: inline-block;
            margin: 0 0.3rem;
        }

        .intro-text i {
            color: #b68b40;
            margin: 0 0.5rem;
        }

        /* الأقسام الرئيسية - في صف واحد */
        .sections-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 0.8rem;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #b68b40 #e0e9f2;
            -webkit-overflow-scrolling: touch;
        }

        .sections-row::-webkit-scrollbar {
            height: 6px;
        }

        .sections-row::-webkit-scrollbar-track {
            background: #e0e9f2;
            border-radius: 10px;
        }

        .sections-row::-webkit-scrollbar-thumb {
            background: #b68b40;
            border-radius: 10px;
        }

        .section-card {
            flex: 0 0 auto;
            width: 160px;
            background: white;
            border-radius: 30px;
            padding: 1rem 0.8rem;
            box-shadow: 0 8px 18px rgba(0, 40, 60, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 60, 90, 0.15);
            border-color: #b68b40;
        }

        .section-card.active {
            border-color: #b68b40;
            background: linear-gradient(145deg, #f9f3e8, #fff9f0);
        }

        .section-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #b68b40, #dba959);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .section-card:hover::before,
        .section-card.active::before {
            transform: scaleX(1);
        }

        .section-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(182, 139, 64, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b68b40;
            font-size: 1.3rem;
            margin: 0 auto 0.5rem auto;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #05445E;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }

        /* منطقة عرض التفاصيل */
        .details-panel {
            background: white;
            border-radius: 40px;
            padding: 1.8rem;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 20px 40px -15px #05405b;
            border: 1px solid rgba(255,255,255,0.7);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .details-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px dotted #b68b40;
            padding-bottom: 1rem;
        }

        .panel-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(182, 139, 64, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b68b40;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            color: #05445E;
        }

        /* بطاقات المحتوى الداخلي */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .content-card {
            background: #f8faff;
            border-radius: 30px;
            padding: 1.3rem;
            border: 1px solid #e6eef9;
            transition: all 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 60, 90, 0.1);
            border-color: #b68b40;
        }

        .content-card h3 {
            font-size: 1.1rem;
            color: #05445E;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .content-card h3 i {
            color: #b68b40;
        }

        .content-list {
            list-style: none;
        }

        .content-list li {
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            padding: 0.3rem;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .content-list li:hover {
            background: rgba(182, 139, 64, 0.08);
        }

        .content-list li i {
            color: #b68b40;
            width: 20px;
            font-size: 0.9rem;
        }

        /* روابط التحميل */
        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: linear-gradient(145deg, #05445E, #1E6F9F);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            margin: 0.2rem;
        }

        .download-link:hover {
            background: linear-gradient(145deg, #0a5a7a, #2a80b0);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 70, 100, 0.3);
        }

        /* بطاقات المشاريع */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .project-card {
            background: white;
            border-radius: 25px;
            padding: 1.2rem;
            border: 1px solid #e0e9f2;
            transition: all 0.3s;
        }

        .project-card:hover {
            border-color: #b68b40;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 60, 90, 0.1);
        }

        .project-title {
            font-size: 1rem;
            font-weight: 700;
            color: #05445E;
            margin-bottom: 0.4rem;
        }

        .project-student {
            color: #b68b40;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .project-dept {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .project-desc {
            color: #444;
            font-size: 0.8rem;
            line-height: 1.5;
            margin-bottom: 0.8rem;
        }

        .project-link {
            color: #b68b40;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* أخبار وفعاليات */
        .news-item {
            display: flex;
            gap: 0.8rem;
            padding: 0.8rem;
            border-bottom: 1px dashed #e0e9f2;
        }

        .news-date {
            background: #b68b40;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            height: fit-content;
            white-space: nowrap;
        }

        .news-content h4 {
            font-size: 0.95rem;
            color: #05445E;
            margin-bottom: 0.2rem;
        }

        .news-content p {
            color: #666;
            font-size: 0.8rem;
        }

        /* استبيانات */
        .survey-item {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 0.8rem;
        }

        .survey-question {
            font-weight: 600;
            color: #05445E;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .rating-stars {
            color: #b68b40;
            font-size: 1rem;
            margin: 0.3rem 0;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #205b78;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .section-card {
                width: 140px;
                padding: 0.8rem 0.5rem;
            }
            
            .section-icon {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            
            .section-title {
                font-size: 0.9rem;
            }
            
            .panel-header h2 {
                font-size: 1.3rem;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        function showSection(sectionId) {
            // تحديث حالة الأزرار
            document.querySelectorAll('.section-card').forEach(card => {
                card.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // عرض التفاصيل

            panel.innerHTML = sectionsData[sectionId].content;
            panel.classList.add('active');
        }
